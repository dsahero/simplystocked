# Local development only — Cloud Run deploys each service separately
services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: simplystocked
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql_files:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: mysql+pymysql://root:${DB_PASSWORD}@db:3306/simplystocked
      CORS_ORIGINS: http://localhost,http://localhost:3000,http://localhost:5173
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SQL_ECHO: "false"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        VITE_GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      - backend

volumes:
  mysql_data:
